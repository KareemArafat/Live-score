name: live_score_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  provider: ^6.1.5+1
  dio: ^5.9.0
  dartz: ^0.10.1
  get_it: ^9.2.0
  go_router: ^17.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  table_calendar: ^3.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  percent_indicator: ^4.2.5
  step_progress_indicator: ^1.0.2
  dropdown_button2: ^2.3.9
  equatable: ^2.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.4  # for app icon


flutter_launcher_icons: # app icon config
  android: true
  ios: true
  image_path: "assets/images/logo.png"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets\fonts\Poppins-Regular.ttf
        - asset: assets\fonts\Poppins-Medium.ttf
          weight: 500
        - asset: assets\fonts\Poppins-Bold.ttf
          weight: 700
